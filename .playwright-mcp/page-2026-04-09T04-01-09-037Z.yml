              - text: 【注意事項】
              - text: ・現在リリースのバージョンはｅ支店・ＡＰＩ（ｖ４ｒ８）です。
              - text: ・保守や機能追加等によりＵＲＬのＰｒｅｆｉｘ（e_api_v4rN 部分）を
              - text: e_api_v4rN（リビジョンＮ）またはe_api_vN（バージョンＮ）として平行リリースします。
              - text: ・後続版の平行リリース後６０日前後（保守作業は非営業日に実施）
              - text: 旧リリース版の利用を停止（廃止）しますので、
              - text: 後続版リリース後はお早めにお客様プログラムの後続版への対応をお願いいたします。
              - text: ・後続版リリース等の連絡は本ページ・リリース＆改定情報にてお知らせするため、
              - text: 該当ページを定期的に参照願います。
              - text: ・本マニュアルページからのリンク資料について改定がない場合は旧バージョンのままとなります。
              - text: 改定時は該当バージョンとして掲載いたしますので、最新版をご利用願います。
              - text: ※改定版公開のタイミングで旧版は自動的に廃版とさせて頂きます。
              - text: 【デモ環境】
              - text: お客様のテスト環境としてｅ支店・デモ環境に専用環境を用意いたしました。
              - text: ご利用時間帯等につきましては
              - link "こちら" [ref=e24] [cursor=pointer]:
                - /url: "#ComP1"
                - img [ref=e25]
                - text: こちら
              - text: を参照願います。
              - text: 【アクセス方法】
              - text: "・認証機能は 「ｅ支店・ＡＰＩ専用ＵＲＬ/auth/?{引数}」"
              - text: "・業務機能は 「仮想URL（REQUEST）?{引数}」"
              - text: "・マスタ機能は 「仮想URL（MASTER）?{引数}」"
              - text: "・時価情報機能は「仮想URL（PRICE）?{引数}」"
              - text: "※{引数｝に JSON 文字列形式で要求を指定、指定項目等の説明は各機能説明を参照。"
              - text: "※認証機能例：「https://kabuka.e-shiten.jp/e_api_vNrN/auth/?{\"p_no\":\"1\",\"p_sd_date\":\"yyyy.mm.dd-hh:mn:ss.ttt\",\"sCLMID\":\"CLMAuthLoginRequest\",\"sPassword\":\"oxox\",\"sUserId\":\"oxox\"}」"

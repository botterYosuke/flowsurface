name: E2E Tests (Hyperliquid)

# Binance / Bybit は GitHub Actions の US IP からブロックされる (HTTP 451/403)。
# Hyperliquid は geo-restriction なしで US IP からアクセス可能なため採用。
on:
  push:
    branches: [sasa/develop]
  pull_request:
    branches: [sasa/develop]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── ビルド（成果物を artifact で後続ジョブへ共有）──────────────────────────
  build:
    name: Build (debug)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-debug-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-debug-

      - name: cargo build
        run: cargo build

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: flowsurface-exe
          path: target/debug/flowsurface.exe
          retention-days: 1

  # ── GUI モード（並列）────────────────────────────────────────────────────────
  test-gui:
    name: "GUI: ${{ matrix.name }}"
    needs: build
    runs-on: windows-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          # DEV_IS_DEMO=true で起動（Tachibana 不要）
          - name: S1 Basic lifecycle
            script: s1_basic_lifecycle.sh
            dev_is_demo: "true"
          - name: S2 Persistence
            script: s2_persistence.sh
            dev_is_demo: "true"
          - name: S9 Speed & Step
            script: s9_speed_step.sh
            dev_is_demo: "true"
          - name: S27 CycleSpeed no side-effects
            script: s27_cyclespeed_reset.sh
            dev_is_demo: "true"
          - name: S34 Virtual order basic
            script: s34_virtual_order_basic.sh
            dev_is_demo: "true"
          - name: S35 Virtual portfolio
            script: s35_virtual_portfolio.sh
            dev_is_demo: "true"
          - name: S5 Tachibana mixed
            script: s5_tachibana_mixed.sh
            dev_is_demo: "true"
          - name: S6 Mixed timeframes
            script: s6_mixed_timeframes.sh
            dev_is_demo: "true"
          # Sidebar API を使うため GUI のみ対応（headless では 501）
          - name: S24 Sidebar select ticker
            script: s24_sidebar_select_ticker.sh
            dev_is_demo: "true"
          - name: S33 Sidebar split pane
            script: s33_sidebar_split_pane.sh
            dev_is_demo: "true"
          - name: S36 Sidebar order pane
            script: s36_sidebar_order_pane.sh
            dev_is_demo: "true"
          - name: S37 Order panels integrated
            script: s37_order_panels_integrated.sh
            dev_is_demo: "true"
          - name: S39 Buying power portfolio
            script: s39_buying_power_portfolio.sh
            dev_is_demo: "true"
          - name: S30 Mixed sample loading
            script: s30_mixed_sample_loading.sh
            dev_is_demo: ""
          - name: S31 Replay end restart
            script: s31_replay_end_restart.sh
            dev_is_demo: ""
          - name: S46 Wrong password
            script: s46_wrong_password.sh
            dev_is_demo: "true"
          - name: S47 Outside hours
            script: s47_outside_hours.sh
            dev_is_demo: "true"
          - name: S48 Invalid issue
            script: s48_invalid_issue.sh
            dev_is_demo: "true"
          - name: S1b Limit buy
            script: s1b_limit_buy.sh
            dev_is_demo: ""
          - name: S1c Market sell
            script: s1c_market_sell.sh
            dev_is_demo: ""
          - name: S1d Limit sell
            script: s1d_limit_sell.sh
            dev_is_demo: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download exe artifact
        uses: actions/download-artifact@v4
        with:
          name: flowsurface-exe
          path: target/debug/

      - name: Prepare data directory
        shell: bash
        run: mkdir -p "$APPDATA/flowsurface/market_data"

      - name: Run ${{ matrix.name }}
        shell: bash
        env:
          FLOWSURFACE_EXE: ${{ github.workspace }}/target/debug/flowsurface.exe
          E2E_TICKER: HyperliquidLinear:BTC
          DEV_IS_DEMO: ${{ matrix.dev_is_demo }}
          DEV_USER_ID: ${{ secrets.DEV_USER_ID }}
          DEV_PASSWORD: ${{ secrets.DEV_PASSWORD }}
          DEV_SECOND_PASSWORD: ${{ secrets.DEV_SECOND_PASSWORD }}
        run: bash tests/${{ matrix.script }}

      - name: Upload debug log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: log-gui-${{ matrix.script }}
          path: ${{ runner.temp }}/e2e_debug.log

  # ── Headless モード（並列）───────────────────────────────────────────────────
  test-headless:
    name: "Headless: ${{ matrix.name }}"
    needs: build
    runs-on: windows-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: S1 Basic lifecycle
            script: s1_basic_lifecycle.sh
          - name: S3 Auto-play
            script: s3_autoplay.sh
          - name: S9 Speed & Step
            script: s9_speed_step.sh
          - name: S27 CycleSpeed no side-effects
            script: s27_cyclespeed_reset.sh
          - name: S35 Virtual portfolio
            script: s35_virtual_portfolio.sh
          - name: S40 Virtual order fill cycle
            script: s40_virtual_order_fill_cycle.sh
          - name: S41 Limit order round trip
            script: s41_limit_order_round_trip.sh
          - name: S42 Naked short cycle
            script: s42_naked_short_cycle.sh
          - name: S43 GET replay/state
            script: s43_get_state_endpoint.sh
          - name: X4 Virtual order Live guard
            script: x4_virtual_order_live_guard.sh
          - name: S10 Range end
            script: s10_range_end.sh
          - name: S11 Bar step discrete
            script: s11_bar_step_discrete.sh
          - name: S12 Pre-start history
            script: s12_pre_start_history.sh
          - name: S13 Step backward quality
            script: s13_step_backward_quality.sh
          - name: S16 Replay resilience
            script: s16_replay_resilience.sh
          - name: S18 Endurance
            script: s18_endurance.sh
          - name: S26 Ticker change after replay end
            script: s26_ticker_change_after_replay_end.sh
          - name: X2 Buttons
            script: x2_buttons.sh
          - name: S7 Mid-replay pane
            script: s7_mid_replay_pane.sh
          - name: S17 Error boundary
            script: s17_error_boundary.sh
          - name: S23 Mid-replay ticker change
            script: s23_mid_replay_ticker_change.sh
          - name: S28 Ticker change while loading
            script: s28_ticker_change_while_loading.sh
          - name: X1 Current time
            script: x1_current_time.sh
          - name: S8 Error boundary
            script: s8_error_boundary.sh

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download exe artifact
        uses: actions/download-artifact@v4
        with:
          name: flowsurface-exe
          path: target/debug/

      - name: Prepare data directory
        shell: bash
        run: mkdir -p "$APPDATA/flowsurface/market_data"

      - name: Run ${{ matrix.name }}
        shell: bash
        env:
          FLOWSURFACE_EXE: ${{ github.workspace }}/target/debug/flowsurface.exe
          E2E_TICKER: HyperliquidLinear:BTC
          IS_HEADLESS: "true"
        run: bash tests/${{ matrix.script }}

      - name: Upload debug log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: log-headless-${{ matrix.script }}
          path: ${{ runner.temp }}/e2e_headless_debug.log

  # ── Tachibana セッション直列（デモ・実チャンネル共通）────────────────────────
  # 同一 DEV_USER_ID で Tachibana 認証を行うジョブをすべて集約。
  # Tachibana は同一アカウントの同時セッションを無効化するため max-parallel: 1 で直列実行する。
  # S40/S41/S42 は実チャンネル認証（DEV_IS_DEMO=""）のため test-gui 並列実行から除外し
  # ここで直列化することでブローカー側アカウントロック（sResultCode=10033/10088）を防ぐ。
  # S22 は 15〜30 分かかるため timeout-minutes を 45 に設定する。
  test-gui-tachibana-session:
    name: "GUI Tachibana Session: ${{ matrix.name }}"
    needs: build
    runs-on: windows-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: S44 Order list
            script: s44_order_list.sh
            dev_is_demo: "true"
          - name: S45 Order correct cancel
            script: s45_order_correct_cancel.sh
            dev_is_demo: "true"
          - name: S49 Account info
            script: s49_account_info.sh
            dev_is_demo: "true"
          - name: S14 Autoplay event driven
            script: s14_autoplay_event_driven.sh
            dev_is_demo: ""
          - name: S20 Tachibana replay resilience
            script: s20_tachibana_replay_resilience.sh
            dev_is_demo: ""
          - name: S21 Tachibana error boundary
            script: s21_tachibana_error_boundary.sh
            dev_is_demo: ""
          - name: S22 Tachibana endurance
            script: s22_tachibana_endurance.sh
            dev_is_demo: "true"
          - name: S29 Tachibana holiday skip
            script: s29_tachibana_holiday_skip.sh
            dev_is_demo: "true"
          - name: S32 Toyota candlestick add
            script: s32_toyota_candlestick_add.sh
            dev_is_demo: ""
          # 実チャンネル認証（DEV_IS_DEMO=""）— test-gui 並列実行から移動して直列化
          - name: S40 Virtual order fill cycle
            script: s40_virtual_order_fill_cycle.sh
            dev_is_demo: ""
          - name: S41 Limit order round trip
            script: s41_limit_order_round_trip.sh
            dev_is_demo: ""
          - name: S42 Naked short cycle
            script: s42_naked_short_cycle.sh
            dev_is_demo: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download exe artifact
        uses: actions/download-artifact@v4
        with:
          name: flowsurface-exe
          path: target/debug/

      - name: Prepare data directory
        shell: bash
        run: mkdir -p "$APPDATA/flowsurface/market_data"

      - name: Run ${{ matrix.name }}
        shell: bash
        env:
          FLOWSURFACE_EXE: ${{ github.workspace }}/target/debug/flowsurface.exe
          E2E_TICKER: HyperliquidLinear:BTC
          DEV_IS_DEMO: ${{ matrix.dev_is_demo }}
          DEV_USER_ID: ${{ secrets.DEV_USER_ID }}
          DEV_PASSWORD: ${{ secrets.DEV_PASSWORD }}
          DEV_SECOND_PASSWORD: ${{ secrets.DEV_SECOND_PASSWORD }}
        run: bash tests/${{ matrix.script }}

      - name: Upload debug log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: log-gui-${{ matrix.script }}
          path: ${{ runner.temp }}/e2e_debug.log


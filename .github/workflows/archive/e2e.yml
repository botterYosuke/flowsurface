name: E2E Tests

# ─── トリガー ──────────────────────────────────────────────────────────────
# • push/PR (main): S1〜S17 の自動回帰テスト（debug ビルド + 本番 Tachibana API、~30 分）
# • workflow_dispatch: S1〜S17 に加え、S18（耐久）と S19〜S22（本番認証）を
#   オプション実行。run_s18 / run_s19_s22 フラグで制御する。
# • すべてのジョブで DEV_USER_ID / DEV_PASSWORD を使用して本番 Tachibana API に接続する。
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_s18:
        description: "S18（耐久テスト、~30 分）を実行する"
        type: boolean
        default: false
      run_s19_s22:
        description: "S19〜S22（本番 Tachibana 認証必須）を実行する"
        type: boolean
        default: false

# ─── 同一ブランチの前実行をキャンセル ────────────────────────────────────
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # ジョブ 1: S1〜S17（debug ビルド、本番 Tachibana API 使用）
  # ──────────────────────────────────────────────────────────────────────────
  e2e-live:
    name: "E2E S1–S17 (live)"
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      # Node.js — E2E スクリプト内の node コマンド・JSON 操作で使用
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Rust ツールチェーン
      - name: Install Rust stable
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      # cargo キャッシュ
      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-debug-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-debug-

      # ビルド（debug）— DEV AUTO-LOGIN は debug_assertions でのみ有効
      - name: Build (debug)
        run: cargo build

      # データディレクトリを事前作成（CI 環境では存在しない場合がある）
      - name: Prepare data directory
        shell: bash
        run: mkdir -p "$APPDATA/flowsurface"

      # S1〜S14: 基本・境界・ステップ系（高速）
      - name: "S1  Basic lifecycle"
        shell: bash
        env:
          FLOWSURFACE_EXE: ${{ github.workspace }}/target/debug/flowsurface.exe
        run: bash tests/s1_basic_lifecycle.sh

      - name: "S2  Persistence"
        shell: bash
        env:
          FLOWSURFACE_EXE: ${{ github.workspace }}/target/debug/flowsurface.exe
        run: bash tests/s2_persistence.sh

      - name: "S3  Autoplay"
        shell: bash
        env:
          FLOWSURFACE_EXE: ${{ github.workspace }}/target/debug/flowsurface.exe
        run: bash tests/s3_autoplay.sh

      - name: "S4  Multi-pane Binance"
        shell: bash
        env:
          FLOWSURFACE_EXE: ${{ github.workspace }}/target/debug/flowsurface.exe
        run: bash tests/s4_multi_pane_binance.sh

      - name: "S5  Tachibana mixed (live)"
        shell: bash
        env:
          DEV_USER_ID: ${{ secrets.DEV_USER_ID }}
          DEV_PASSWORD: ${{ secrets.DEV_PASSWORD }}
          FLOWSURFACE_EXE_DEBUG: ${{ github.workspace }}/target/debug/flowsurface.exe
        run: bash tests/s5_tachibana_mixed.sh

      - name: "S6  Mixed timeframes"
        shell: bash
        env:
          FLOWSURFACE_EXE: ${{ github.workspace }}/target/debug/flowsurface.exe
        run: bash tests/s6_mixed_timeframes.sh

      - name: "S7  Mid-replay pane"
        shell: bash
        env:
          FLOWSURFACE_EXE: ${{ github.workspace }}/target/debug/flowsurface.exe
        run: bash tests/s7_mid_replay_pane.sh

      - name: "S8  Error boundary"
        shell: bash
        env:
          FLOWSURFACE_EXE: ${{ github.workspace }}/target/debug/flowsurface.exe
        run: bash tests/s8_error_boundary.sh

      - name: "S9  Speed & step"
        shell: bash
        env:
          FLOWSURFACE_EXE: ${{ github.workspace }}/target/debug/flowsurface.exe
        run: bash tests/s9_speed_step.sh

      - name: "S10 Range end"
        shell: bash
        env:
          FLOWSURFACE_EXE: ${{ github.workspace }}/target/debug/flowsurface.exe
        run: bash tests/s10_range_end.sh

      - name: "S11 Bar step discrete"
        shell: bash
        env:
          FLOWSURFACE_EXE: ${{ github.workspace }}/target/debug/flowsurface.exe
        run: bash tests/s11_bar_step_discrete.sh

      - name: "S12 Pre-start history"
        shell: bash
        env:
          FLOWSURFACE_EXE: ${{ github.workspace }}/target/debug/flowsurface.exe
        run: bash tests/s12_pre_start_history.sh

      - name: "S13 Step-backward quality"
        shell: bash
        env:
          FLOWSURFACE_EXE: ${{ github.workspace }}/target/debug/flowsurface.exe
        run: bash tests/s13_step_backward_quality.sh

      - name: "S14 Autoplay event-driven"
        shell: bash
        env:
          DEV_USER_ID: ${{ secrets.DEV_USER_ID }}
          DEV_PASSWORD: ${{ secrets.DEV_PASSWORD }}
          FLOWSURFACE_EXE_DEBUG: ${{ github.workspace }}/target/debug/flowsurface.exe
        run: bash tests/s14_autoplay_event_driven.sh

      # S15〜S17: chart-snapshot / 操作耐性 / エラー境界（中程度）
      - name: "S15 Chart snapshot"
        shell: bash
        env:
          FLOWSURFACE_EXE: ${{ github.workspace }}/target/debug/flowsurface.exe
        run: bash tests/s15_chart_snapshot.sh

      - name: "S16 Replay resilience"
        shell: bash
        env:
          FLOWSURFACE_EXE: ${{ github.workspace }}/target/debug/flowsurface.exe
        run: bash tests/s16_replay_resilience.sh

      - name: "S17 Error boundary"
        shell: bash
        env:
          FLOWSURFACE_EXE: ${{ github.workspace }}/target/debug/flowsurface.exe
        run: bash tests/s17_error_boundary.sh

  # ──────────────────────────────────────────────────────────────────────────
  # ジョブ 2: S18 耐久テスト（手動実行のみ、~30 分）
  # ──────────────────────────────────────────────────────────────────────────
  e2e-endurance:
    name: "E2E S18 Endurance (~30 min)"
    runs-on: windows-latest
    timeout-minutes: 90
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.run_s18 == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust stable
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-debug-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-debug-

      - name: Build (debug)
        run: cargo build

      - name: Prepare data directory
        shell: bash
        run: mkdir -p "$APPDATA/flowsurface"

      - name: "S18 Endurance"
        shell: bash
        env:
          FLOWSURFACE_EXE: ${{ github.workspace }}/target/debug/flowsurface.exe
        run: bash tests/s18_endurance.sh

  # ──────────────────────────────────────────────────────────────────────────
  # ジョブ 3: S19〜S22 本番 Tachibana 認証テスト（手動実行のみ）
  # Secrets: DEV_USER_ID / DEV_PASSWORD をリポジトリ Secret に設定すること
  # ──────────────────────────────────────────────────────────────────────────
  e2e-tachibana-live:
    name: "E2E S19–S22 Tachibana live (requires secrets)"
    runs-on: windows-latest
    timeout-minutes: 120
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.run_s19_s22 == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust stable
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-debug-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-debug-

      # S19〜S22 は DEV AUTO-LOGIN を使うデバッグビルド
      - name: Build (debug)
        run: cargo build

      - name: Prepare data directory
        shell: bash
        run: mkdir -p "$APPDATA/flowsurface"

      - name: "S19 Tachibana chart-snapshot"
        shell: bash
        env:
          DEV_USER_ID: ${{ secrets.DEV_USER_ID }}
          DEV_PASSWORD: ${{ secrets.DEV_PASSWORD }}
          FLOWSURFACE_EXE_DEBUG: ${{ github.workspace }}/target/debug/flowsurface.exe
        run: bash tests/s19_tachibana_chart_snapshot.sh

      - name: "S20 Tachibana replay resilience"
        shell: bash
        env:
          DEV_USER_ID: ${{ secrets.DEV_USER_ID }}
          DEV_PASSWORD: ${{ secrets.DEV_PASSWORD }}
          FLOWSURFACE_EXE_DEBUG: ${{ github.workspace }}/target/debug/flowsurface.exe
        run: bash tests/s20_tachibana_replay_resilience.sh

      - name: "S21 Tachibana error boundary"
        shell: bash
        env:
          DEV_USER_ID: ${{ secrets.DEV_USER_ID }}
          DEV_PASSWORD: ${{ secrets.DEV_PASSWORD }}
          FLOWSURFACE_EXE_DEBUG: ${{ github.workspace }}/target/debug/flowsurface.exe
        run: bash tests/s21_tachibana_error_boundary.sh

      - name: "S22 Tachibana endurance (~30 min)"
        shell: bash
        env:
          DEV_USER_ID: ${{ secrets.DEV_USER_ID }}
          DEV_PASSWORD: ${{ secrets.DEV_PASSWORD }}
          FLOWSURFACE_EXE_DEBUG: ${{ github.workspace }}/target/debug/flowsurface.exe
        run: bash tests/s22_tachibana_endurance.sh
